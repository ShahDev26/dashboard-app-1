<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MEL Test Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<!-- SheetJS — used by QA Excel exports (per-module + bulk) -->
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<style>
  :root {
    --bg:#f6f7fb; --surface:#ffffff; --surface-2:#f9fafc; --surface-hi:#eef0f6;
    --border:#e2e6ef; --border-hi:#cbd2de;
    --text:#0f172a; --text-2:#475569; --text-3:#94a3b8;
    --primary:#6366f1; --primary-hi:#4f46e5; --primary-soft:#eef2ff;
    --violet:#8b5cf6; --violet-soft:#f3eaff;
    --emerald:#10b981; --emerald-soft:#ecfdf5;
    --rose:#f43f5e; --rose-soft:#ffe4e6;
    --amber:#f59e0b; --amber-soft:#fef3c7;
    --orange:#fb923c; --orange-soft:#fff0e2;
    --red:#ef4444; --red-soft:#fee2e2;
    --slate:#64748b; --slate-soft:#f1f5f9;
    --shadow-sm:0 1px 2px rgba(15,23,42,0.04),0 1px 3px rgba(15,23,42,0.06);
    --shadow:0 4px 12px rgba(15,23,42,0.06),0 2px 4px rgba(15,23,42,0.04);
    --shadow-lg:0 16px 48px rgba(15,23,42,0.10),0 4px 12px rgba(15,23,42,0.06);
    --topbar-h:72px; --sidebar-w:288px;
  }
  *{box-sizing:border-box}html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased}
  .topbar{position:sticky;top:0;z-index:60;height:var(--topbar-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 32px;gap:28px}
  .topbar-sep{width:1px;height:28px;background:var(--border)}
  .logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:17px;color:var(--text);cursor:pointer;letter-spacing:-0.02em}
  .logo-mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--primary),var(--violet));display:grid;place-items:center;color:#fff;font-size:18px;box-shadow:0 4px 10px rgba(99,102,241,0.35)}
  .logo-sub{color:var(--text-3);font-weight:500;font-size:13px}
  .topnav{display:flex;align-items:center;gap:8px;margin-left:4px}
  .role-chip{display:inline-flex;align-items:center;gap:7px;padding:7px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text-2);font-size:13px;font-weight:500;cursor:pointer;user-select:none;transition:100ms}
  .role-chip:hover{background:var(--surface-hi);color:var(--text)}
  .role-chip .dot{width:6px;height:6px;border-radius:50%;background:var(--text-3)}
  .role-chip[data-role="Admin"] .dot{background:var(--primary)}
  .role-chip[data-role="State Head"] .dot{background:var(--violet)}
  .role-chip[data-role="GSCO"] .dot{background:var(--emerald)}
  .role-chip.on{background:var(--primary-soft);color:var(--primary-hi);border-color:var(--primary);font-weight:600}
  .role-chip.on[data-role="State Head"]{background:var(--violet-soft);color:var(--violet);border-color:var(--violet)}
  .role-chip.on[data-role="GSCO"]{background:var(--emerald-soft);color:var(--emerald);border-color:var(--emerald)}
  .top-stats{margin-left:auto;display:flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-2)}
  .top-actions{display:flex;align-items:center;gap:10px}
  .stat-pill{padding:6px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:7px}
  .stat-pill b{color:var(--text);font-weight:700;margin-right:3px}
  .stat-pill.pass b{color:var(--emerald)}
  .stat-pill.fail b{color:var(--red)}
  .stat-pill.hold b{color:var(--amber)}
  .stat-pill.idle b{color:var(--slate)}
  .top-meta{color:var(--text-3);font-size:11px}
  .logout-btn{padding:9px 16px;background:var(--surface);border:1px solid var(--border);border-radius:9px;color:var(--text-2);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:100ms;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
  .logout-btn:hover{background:var(--surface-hi);color:var(--text);border-color:var(--border-hi)}
  .menu-btn{display:none;background:var(--surface);border:1px solid var(--border);border-radius:8px;width:36px;height:36px;align-items:center;justify-content:center;cursor:pointer;color:var(--text-2);font-size:18px}
  .shell{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:calc(100vh - var(--topbar-h))}
  .sidebar{position:sticky;top:var(--topbar-h);height:calc(100vh - var(--topbar-h));overflow-y:auto;background:var(--surface);border-right:1px solid var(--border);padding:22px 16px}
  .sidebar .home-link{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:9px;color:var(--text-2);cursor:pointer;font-weight:600;font-size:14px;margin-bottom:6px}
  .sidebar .home-link:hover{background:var(--surface-hi);color:var(--text)}
  .sidebar .home-link.active{background:var(--primary-soft);color:var(--primary-hi)}
  /* Top-level nav blocks */
  .sidebar .nav-section{margin-top:6px}
  .sidebar .nav-section + .nav-section{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
  /* Collapsible group header (Admin / State Head / GSCO) */
  .sidebar .group-head{display:flex;align-items:center;gap:11px;padding:11px 14px;border-radius:9px;color:var(--text);cursor:pointer;font-weight:700;font-size:14px;transition:80ms;user-select:none}
  .sidebar .group-head:hover{background:var(--surface-hi)}
  .sidebar .group-head.has-active{color:var(--primary-hi)}
  .sidebar .group-head .ic{font-size:18px;width:24px;text-align:center}
  .sidebar .group-head .nm{flex:1}
  .sidebar .group-head .ct{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-3);background:var(--surface-hi);padding:2px 8px;border-radius:999px;font-weight:600;min-width:28px;text-align:center}
  .sidebar .group-head .chev{font-size:11px;color:var(--text-3);transition:transform 160ms;width:14px;text-align:center}
  .sidebar .group-head.open .chev{transform:rotate(90deg)}
  .sidebar .group-body{display:none;padding:6px 0 4px 6px;margin-left:18px;border-left:1px dashed var(--border)}
  .sidebar .group-body.open{display:block}
  .sidebar .group-body.empty{padding:6px 14px;color:var(--text-3);font-size:12px;font-style:italic}
  .sidebar .subgroup{padding:8px 12px 4px;font-size:10.5px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:0.10em;display:flex;align-items:center;gap:8px}
  .sidebar .subgroup .sub-count{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-3);font-weight:600;letter-spacing:0.02em}
  .sidebar .module-link{display:flex;align-items:center;gap:11px;padding:9px 12px;margin-top:2px;border-radius:8px;color:var(--text-2);font-size:13px;font-weight:500;cursor:pointer;transition:80ms}
  .sidebar .module-link:hover{background:var(--surface-hi);color:var(--text)}
  .sidebar .module-link.active{background:var(--primary-soft);color:var(--primary-hi);font-weight:600}
  .sidebar .module-link .ic{font-size:15px}
  .sidebar .module-link .count{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-3);background:var(--surface-hi);padding:2px 9px;border-radius:999px;min-width:28px;text-align:center}
  .sidebar .module-link.active .count{background:rgba(99,102,241,0.18);color:var(--primary-hi)}
  /* Top-level (non-grouped) module rows — full-width like Home link */
  .sidebar .nav-section.top-mod .module-link{padding:11px 14px;font-size:14px;font-weight:600;color:var(--text)}
  .sidebar .nav-section.top-mod .module-link .ic{font-size:18px;width:24px;text-align:center}
  main{padding:26px 32px 80px;max-width:1400px}
  .hero{background:linear-gradient(135deg,#fff,#f5f7ff);border:1px solid var(--border);border-radius:16px;padding:28px 32px;margin-bottom:26px;position:relative;overflow:hidden}
  .hero::after{content:'';position:absolute;right:-60px;top:-60px;width:240px;height:240px;background:radial-gradient(circle,rgba(99,102,241,0.15),transparent 70%)}
  .hero h1{margin:0 0 6px;font-size:28px;font-weight:800;letter-spacing:-0.02em;color:var(--text)}
  .hero p{margin:0;color:var(--text-2);font-size:14px}
  .hero .role-banner{margin-top:14px;display:inline-flex;align-items:center;gap:8px;padding:6px 12px;background:var(--surface);border:1px solid var(--border);border-radius:999px;font-size:12px;color:var(--text-2)}
  .hero .role-banner b{color:var(--text);font-weight:600}
  .cat-block{margin-bottom:32px}
  .cat-title{font-size:12px;font-weight:700;color:var(--text-3);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.1em}
  .module-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
  .module-card{padding:18px;background:var(--surface);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:120ms}
  .module-card:hover{transform:translateY(-2px);border-color:var(--primary);box-shadow:var(--shadow)}
  .module-card .ic{font-size:28px;display:block;margin-bottom:10px}
  .module-card .name{font-weight:700;font-size:15px;color:var(--text)}
  .module-card .meta{font-size:12px;color:var(--text-2);margin-top:6px}
  .module-card .progress{height:4px;border-radius:999px;background:var(--surface-hi);margin-top:14px;overflow:hidden}
  .module-card .progress>div{height:100%;background:linear-gradient(90deg,var(--primary),var(--violet));transition:width 400ms ease}
  .crumb{font-size:12px;color:var(--text-3);margin-bottom:6px;font-family:'JetBrains Mono',monospace}
  .crumb a{color:var(--primary);text-decoration:none;cursor:pointer}
  .crumb a:hover{text-decoration:underline}
  .page-head{display:flex;align-items:center;gap:16px;margin-bottom:22px}
  .page-head .ic{width:56px;height:56px;border-radius:14px;background:var(--primary-soft);display:grid;place-items:center;font-size:28px}
  .page-head h1{margin:0;font-size:24px;font-weight:800;letter-spacing:-0.015em;color:var(--text)}
  .page-head .sub{font-size:13px;color:var(--text-2)}
  .filter-bar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:22px;display:flex;flex-wrap:wrap;gap:12px;align-items:center}
  .fselect{padding:8px 32px 8px 12px;border:1px solid var(--border);border-radius:8px;background-color:var(--surface);background-image:url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20' fill='%2364748b'%3E%3Cpath fill-rule='evenodd' d='M5.23 7.21a.75.75 0 011.06.02L10 11.06l3.71-3.83a.75.75 0 111.08 1.04l-4.25 4.39a.75.75 0 01-1.08 0L5.21 8.27a.75.75 0 01.02-1.06z' clip-rule='evenodd'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center;background-size:14px;font-family:'Inter',sans-serif;font-size:13px;color:var(--text);cursor:pointer;appearance:none;-webkit-appearance:none;-moz-appearance:none;min-width:150px;transition:100ms}
  .fselect:hover{border-color:var(--border-hi);background-color:var(--surface-hi)}
  .fselect:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,0.15)}
  .fselect.active{border-color:var(--primary);background-color:var(--primary-soft);color:var(--primary-hi);font-weight:600}
  .search{flex:1;min-width:200px;padding:7px 12px 7px 32px;border:1px solid var(--border);border-radius:8px;background:var(--surface) url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20' fill='%2394a3b8'%3E%3Cpath fill-rule='evenodd' d='M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z' clip-rule='evenodd'/%3E%3C/svg%3E") no-repeat 10px center;background-size:14px;font-family:'Inter',sans-serif;font-size:13px;color:var(--text);outline:none}
  .search:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,0.15)}
  .btn{padding:7px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text-2);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:100ms}
  .btn:hover{background:var(--surface-hi);color:var(--text);border-color:var(--border-hi)}
  .btn.primary{background:var(--primary-hi);border-color:var(--primary-hi);color:#fff}
  .btn.primary:hover{background:var(--primary);border-color:var(--primary);color:#fff}
  .tc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px}
  .tc-card{position:relative;padding:22px 22px 20px;background:var(--surface);border:1px solid var(--border);border-radius:14px;cursor:pointer;transition:200ms cubic-bezier(0.16,1,0.3,1);overflow:hidden;display:flex;flex-direction:column;gap:14px;min-height:138px}
  .tc-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent,var(--primary));opacity:0.7;transition:200ms}
  .tc-card.type-Functional{--accent:var(--primary)}
  .tc-card.type-Negative{--accent:var(--rose)}
  .tc-card.type-Edge{--accent:var(--amber)}
  .tc-card.type-Integration{--accent:var(--violet)}
  .tc-card.type-Accessibility{--accent:var(--emerald)}
  .tc-card.type-Bug{--accent:var(--red)}
  .tc-card.type-Verification{--accent:var(--orange)}
  .tc-card:hover{transform:translateY(-3px);border-color:var(--border-hi);box-shadow:var(--shadow)}
  .tc-card:hover::before{opacity:1;width:4px}
  .tc-card .row1{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .tc-card .tcid{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-3);font-weight:600;letter-spacing:0.05em}
  .tc-card h3{margin:0;font-size:15.5px;font-weight:700;color:var(--text);line-height:1.4;letter-spacing:-0.005em;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .tc-card .meta-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .tc-card .meta-row .tag{font-size:10.5px;font-weight:600;letter-spacing:0.04em;color:var(--text-3);text-transform:uppercase}
  .tc-card .meta-row .tag b{color:var(--text-2);font-weight:700;margin-left:3px;text-transform:none;letter-spacing:0}
  .tc-card .meta-row .tag.priority b{color:var(--text)}
  .tc-card .meta-row .tag.priority.Critical b{color:#b91c1c}
  .tc-card .meta-row .tag.priority.High b{color:#c2410c}
  .tc-card .meta-row .tag.priority.Medium b{color:#b45309}
  .tc-card .meta-row .tag.priority.Low b{color:#047857}
  .tc-card .meta-row .tag.priority.Serious b{color:#be123c}
  .tc-card .meta-row .tag.priority.Minor b{color:var(--slate)}
  .tc-card .meta-row .sep{color:var(--text-3);opacity:0.5}
  .tc-card .foot{display:flex;align-items:center;gap:8px;margin-top:auto;flex-wrap:wrap}
  /* status dot + label (subtle replacement for full pill on card) */
  .dot-status{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--text-2)}
  .dot-status .dot{width:8px;height:8px;border-radius:50%;background:var(--text-3)}
  .dot-status[data-status="Pass"]{color:#047857}
  .dot-status[data-status="Pass"] .dot{background:var(--emerald);box-shadow:0 0 0 3px rgba(16,185,129,0.15)}
  .dot-status[data-status="Fail"]{color:#b91c1c}
  .dot-status[data-status="Fail"] .dot{background:var(--red);box-shadow:0 0 0 3px rgba(239,68,68,0.18)}
  .dot-status[data-status="On Hold"]{color:#b45309}
  .dot-status[data-status="On Hold"] .dot{background:var(--amber);box-shadow:0 0 0 3px rgba(245,158,11,0.18)}
  .pill{display:inline-flex;align-items:center;padding:2px 7px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;border-radius:4px}
  .pill.type.Functional{background:var(--primary-soft);color:var(--primary-hi)}
  .pill.type.Negative{background:var(--rose-soft);color:#be123c}
  .pill.type.Edge{background:var(--amber-soft);color:#b45309}
  .pill.type.Integration{background:var(--violet-soft);color:#6d28d9}
  .pill.type.Accessibility{background:var(--emerald-soft);color:#047857}
  .pill.type.Bug{background:var(--red-soft);color:#b91c1c}
  .pill.type.Verification{background:var(--orange-soft);color:#c2410c}
  .pill.sev.Critical{background:var(--red-soft);color:#b91c1c}
  .pill.sev.High{background:var(--orange-soft);color:#c2410c}
  .pill.sev.Medium{background:var(--amber-soft);color:#b45309}
  .pill.sev.Low{background:var(--emerald-soft);color:#166534}
  .pill.sev.Serious{background:var(--rose-soft);color:#be123c}
  .pill.sev.Minor{background:var(--slate-soft);color:var(--slate)}
  .pill.sev.RESPONSIVE{background:var(--violet-soft);color:#6d28d9}
  .pill.status.Pass{background:var(--emerald-soft);color:#047857}
  .pill.status.Fail{background:var(--red-soft);color:#b91c1c}
  .pill.status.Open{background:var(--orange-soft);color:#c2410c}
  .pill.status[data-status="On Hold"]{background:var(--amber-soft);color:#b45309}
  .tc-card .roles{display:flex;gap:5px;flex-wrap:wrap}
  .role-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;font-size:10px;font-weight:600;background:var(--surface-2);color:var(--text-2);border:1px solid var(--border);border-radius:999px}
  .role-badge.role-Admin{color:var(--primary-hi);background:var(--primary-soft);border-color:var(--primary)}
  .role-badge.role-StateHead{color:var(--violet);background:var(--violet-soft);border-color:var(--violet)}
  .role-badge.role-GSCO{color:#047857;background:var(--emerald-soft);border-color:var(--emerald)}
  .role-badge.role-Any{color:var(--text-3)}
  .empty{grid-column:1/-1;padding:56px 20px;text-align:center;background:var(--surface);border:1px dashed var(--border);border-radius:12px;color:var(--text-3)}
  .empty b{display:block;color:var(--text);font-size:16px;font-weight:700;margin-bottom:4px}
  /* Side drawer (slides in from right) — replaces the old centered modal */
  .modal-bg{position:fixed;inset:0;background:rgba(15,23,42,0.45);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);z-index:200;display:none;opacity:0;transition:opacity 220ms cubic-bezier(0.16,1,0.3,1)}
  .modal-bg.on{display:block;opacity:1}
  .modal{position:fixed;top:0;right:0;bottom:0;width:560px;max-width:100vw;background:var(--surface);box-shadow:-24px 0 60px rgba(15,23,42,0.20),-4px 0 12px rgba(15,23,42,0.08);overflow-y:auto;transform:translateX(100%);transition:transform 320ms cubic-bezier(0.16,1,0.3,1);padding:0}
  .modal-bg.on .modal{transform:translateX(0)}
  /* Sticky header inside drawer */
  .modal .drawer-head{position:sticky;top:0;background:var(--surface);padding:18px 28px 14px;border-bottom:1px solid var(--border);z-index:5;display:flex;align-items:center;gap:14px}
  .modal .drawer-head .tcid{font-family:'JetBrains Mono',monospace;color:var(--text-3);font-weight:600;font-size:11.5px;letter-spacing:0.06em}
  .modal .drawer-head .spacer{margin-left:auto}
  .modal .x{background:var(--surface-2);border:1px solid var(--border);width:32px;height:32px;border-radius:8px;cursor:pointer;color:var(--text-2);font-size:16px;line-height:1;transition:120ms;display:grid;place-items:center}
  .modal .x:hover{background:var(--surface-hi);color:var(--text);border-color:var(--border-hi)}
  .modal .drawer-body{padding:22px 28px 28px}
  .modal .modal-row1{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .modal h2{margin:0 0 22px;font-size:22px;font-weight:700;letter-spacing:-0.012em;color:var(--text);line-height:1.3}
  .modal section{margin-top:24px;padding-top:0;border-top:none}
  .modal section:first-of-type{margin-top:0}
  .modal h4{font-size:10.5px;font-weight:700;color:var(--text-3);margin:0 0 10px;text-transform:uppercase;letter-spacing:0.12em}
  .modal pre{margin:0;font-family:'Inter',sans-serif;font-size:14px;line-height:1.65;color:var(--text-2);white-space:pre-wrap;word-wrap:break-word}
  .modal-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:28px;padding-top:22px;border-top:1px solid var(--border)}

  /* Touchpoints section — grouped checklist of role → screen → action */
  .touchpoints{display:flex;flex-direction:column;gap:14px}

<script>
const DATA = JSON.parse(document.getElementById('quest-data').textContent);
const QA_STATUS_OVERRIDES     = {};  // tcId -> QA-set status
const TICKET_STATUS_OVERRIDES = {};  // tcId -> QA-set ticket status (Pending/Done/On Hold)
const JIRA_KEYS = {};                // tcId -> JIRA issue key from /api/jira/list
let ROLE = 'qa';                     // 'qa' | 'developer' — set from /api/whoami on load
// Accept both the legacy ('editor'/'viewer') and new ('qa'/'developer') role
// names returned by /api/whoami, so the dashboard works whether the rolled-back
// or the rewritten auth module is currently deployed.
const isDeveloper = () => ROLE === 'developer' || ROLE === 'viewer';
const isQA        = () => ROLE === 'qa'        || ROLE === 'editor';
// kept for any legacy callsite — viewer no longer exists
const isViewer = () => false;

function effectiveStatus(tc) {
  if (Object.prototype.hasOwnProperty.call(QA_STATUS_OVERRIDES, tc.id)) {
    return QA_STATUS_OVERRIDES[tc.id] || 'Not run';
  }
  return tc.status || 'Not run';
}

function effectiveTicketStatus(tc) {
  return TICKET_STATUS_OVERRIDES[tc.id] || 'Pending';
}

async function setTicketStatusOnServer(tcId, status) {
  const r = await fetch('/api/status', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    credentials: 'same-origin',
    body: JSON.stringify({ tcId, status, kind: 'ticket' }),
  });
  if (!r.ok) throw new Error(r.status);
  if (!status || status === 'Pending') {
    delete TICKET_STATUS_OVERRIDES[tcId];
  } else {
    TICKET_STATUS_OVERRIDES[tcId] = status;
  }
}

const state = {
  view: 'home', moduleId: null, role: 'All',
  filters: { type:'All', sev:'All', status:'All', ticket:'All' },
  search: '',
};

const TYPES = ['Functional','Negative','Edge','Integration','Accessibility','Bug','Verification'];
const SEVS  = ['Critical','High','Medium','Low','Serious','Minor'];
const STATS = ['Not run','Pass','Fail','On Hold','Open'];
const ROLES = ['Admin','State Head','GSCO'];
const STATUS_CHOICES = ['Not run','Pass','Fail','On Hold'];
const TICKET_STATUS_CHOICES = ['Pending','Done','On Hold','Not Applicable'];

// Modules hidden from sidebar / home / reports / exports.
// (Data is still in DATA, just not surfaced to the user.)
const HIDDEN_MODULE_IDS = new Set(['defects', 'resol']);

// Sidebar navigation structure — hierarchical groups (collapsible) + top-level items.
// 'subgroups' inside a group are labelled sub-headers. Module ids reference DATA.modules.

  { type: 'module',  moduleId: 'auth' },
  { type: 'group',   name: 'Admin', icon: '👑', defaultOpen: true, subgroups: [
      { name: 'Users',       moduleIds: ['users'] },

function el(tag, attrs={}, ...children) {
  const e = document.createElement(tag);
  for (const k in attrs) {
    if (k === 'class') e.className = attrs[k];
    else if (k === 'on') for (const ev in attrs.on) e.addEventListener(ev, attrs.on[ev]);
    else if (k === 'html') e.innerHTML = attrs[k];
    else e.setAttribute(k, attrs[k]);
  }
  for (const c of children) {
    if (c == null) continue;
    if (typeof c === 'string' || typeof c === 'number') e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  }
  return e;
}
function tcMatchesRole(tc) {
  if (state.role === 'All') return true;
  const roles = tc.roles || [];
  if (roles.length === 0) return true;      // No explicit role assignment = applies to every role.
  if (roles.includes('Any')) return true;   // 'Any' is a wildcard — TC is role-agnostic, show under every role filter.
  return roles.includes(state.role);
}

async function loadRole() {

}

async function loadJiraKeys() {

    const data = await r.json();
    for (const k in data) JIRA_KEYS[k] = data[k];

async function loadStatusOverrides() {
  try {
    const r = await fetch('/api/status', { credentials:'same-origin' });
    if (!r.ok) return;
    const data = await r.json();
    const qa     = (data && data.qa)     || {};
    const ticket = (data && data.ticket) || {};
    for (const k in qa)     QA_STATUS_OVERRIDES[k]     = qa[k];
    for (const k in ticket) TICKET_STATUS_OVERRIDES[k] = ticket[k];

}

// Pulls QA edits to TC fields and merges them onto the embedded DATA so the rest
// of the dashboard sees the latest scenario/steps/expected/etc. transparently.
const TC_EDITS = {};  // tcId -> { field: value, ... }
async function loadTcEdits() {
  try {
    const r = await fetch('/api/testcases', { credentials:'same-origin' });
    if (!r.ok) return;
    const data = await r.json();
    for (const tcId in data) TC_EDITS[tcId] = data[tcId] || {};
    // Merge into DATA in-place so every callsite sees the edited fields.
    for (const m of DATA.modules) {
      for (const tc of m.tcs) {
        const overrides = TC_EDITS[tc.id];
        if (!overrides) continue;
        for (const k in overrides) {
          if (overrides[k] !== undefined && overrides[k] !== null) tc[k] = overrides[k];
        }
      }
    }
  } catch (e) { /* fall back to embedded baseline */ }
}

async function saveTcEditOnServer(tcId, fields) {
  const r = await fetch('/api/testcases', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    credentials: 'same-origin',
    body: JSON.stringify({ tcId, fields }),
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.error || ('HTTP ' + r.status));
  }
  TC_EDITS[tcId] = { ...(TC_EDITS[tcId] || {}), ...fields };
  // Mutate the live TC object too so the drawer reflects new values immediately.
  for (const m of DATA.modules) {
    const tc = m.tcs.find(x => x.id === tcId);
    if (tc) { for (const k in fields) tc[k] = fields[k]; break; }
  }
}

async function setStatusOnServer(tcId, status) {
  const r = await fetch('/api/status', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    credentials: 'same-origin',
    body: JSON.stringify({ tcId, status, kind: 'qa' }),
  });
  if (!r.ok) throw new Error(r.status);
  if (!status || status === 'Not run') {
    delete QA_STATUS_OVERRIDES[tcId];
  } else {
    QA_STATUS_OVERRIDES[tcId] = status;
  }
}

function moduleCard(m) {
  const visible = m.tcs.filter(tcMatchesRole);
  const total = visible.length;
  let pass=0, fail=0, hold=0;
  for (const t of visible) {
    const s = effectiveStatus(t);
    if (s==='Pass') pass++;
    else if (s==='Fail') fail++;
    else if (s==='On Hold') hold++;
  }
  const notrun = total - pass - fail - hold;
  const tested = pass + fail + hold;
  const passPct = (pass+fail) > 0 ? Math.round((pass/(pass+fail))*100) : 0;

  let level = 'none';
  if (tested === 0) level = 'none';
  else if (passPct >= 80) level = 'high';
  else if (passPct >= 50) level = 'mid';
  else level = 'low';

  const escH = (window.melCharts && window.melCharts.esc) || (s => String(s ?? ''));

  // Mini donut (64x64) showing the module's pass/fail/hold/notrun mix
  const R = 22, C = 2 * Math.PI * R;
  const segs = [
    { v: pass,   c: '#10b981' },
    { v: fail,   c: '#ef4444' },
    { v: hold,   c: '#f59e0b' },
    { v: notrun, c: '#e2e8f0' },
  ].filter(s => s.v > 0);
  let off = 0;
  const arcs = segs.map(s => {
    const len = (s.v / (total || 1)) * C;
    const arc = `<circle cx="30" cy="30" r="${R}" fill="none" stroke="${s.c}" stroke-width="8" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 30 30)" stroke-linecap="butt"/>`;
    off += len;
    return arc;
  }).join('');
  const donutSvg = total > 0
    ? `<svg width="64" height="64" viewBox="0 0 60 60" aria-hidden="true">
         <circle cx="30" cy="30" r="${R}" fill="none" stroke="#f1f5f9" stroke-width="8"/>
         ${arcs}
         <text x="30" y="34" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">${passPct || 0}%</text>
       </svg>`
    : `<svg width="64" height="64" viewBox="0 0 60 60" aria-hidden="true">
         <circle cx="30" cy="30" r="${R}" fill="none" stroke="#e2e8f0" stroke-width="8" stroke-dasharray="4 4"/>
         <text x="30" y="34" text-anchor="middle" font-size="13" fill="#cbd5e1">—</text>
       </svg>`;

  const card = document.createElement('div');
  card.className = 'module-card';
  card.dataset.coverage = level;
  card.addEventListener('click', () => openModule(m.id));
  card.innerHTML = `
    <div class="mc-accent"></div>
    <div class="mc-grid">
      <div class="mc-donut">${donutSvg}</div>
      <div class="mc-info">
        <div class="mc-cat">${escH(m.category || '')}</div>
        <div class="mc-header">
          <span class="mc-icon">${escH(m.icon || '📋')}</span>
          <span class="mc-name">${escH(m.name)}</span>
        </div>
        <div class="mc-meta">${total} testcase${total===1?'':'s'} · ${tested} executed</div>
      </div>
      <div class="mc-stats">
        ${pass   ? `<span class="mc-chip pass">${pass} pass</span>`       : ''}
        ${fail   ? `<span class="mc-chip fail">${fail} fail</span>`       : ''}
        ${hold   ? `<span class="mc-chip hold">${hold} hold</span>`       : ''}
        ${notrun ? `<span class="mc-chip notrun">${notrun} not run</span>` : ''}
        ${total === 0 ? `<span class="mc-chip notrun">No tests in this view</span>` : ''}
      </div>
    </div>
  `;
  return card;
}

function makeSelect(label,key,options) {
  const isActive = state.filters[key] && state.filters[key]!=='All';
  const sel = el('select',{class:'fselect'+(isActive?' active':''),'aria-label':label,
    on:{change: e => { state.filters[key]=e.target.value; renderModule(); }}});
  for (const opt of options) {
    const o = document.createElement('option');
    o.value = opt;
    o.textContent = opt==='All' ? label+': All' : opt;
    if (state.filters[key]===opt) o.selected = true;
    sel.appendChild(o);
  }
  return sel;
}
function filteredTcs(m) {
  const f = state.filters;
  const q = state.search.trim().toLowerCase();
  return m.tcs.filter(tc => {
    if (!tcMatchesRole(tc)) return false;
    if (f.type!=='All' && tc.type!==f.type) return false;
    if (f.sev!=='All' && tc.severity!==f.sev) return false;
    if (!isDeveloper() && f.status!=='All' && effectiveStatus(tc)!==f.status) return false;
    if (isDeveloper() && f.ticket && f.ticket!=='All' && effectiveTicketStatus(tc)!==f.ticket) return false;
    // Hide 'Not Applicable' TCs from regular module views — they live in the dedicated NA bin (sidebar 🚫). Still visible if the developer explicitly filters for them.
    if (effectiveTicketStatus(tc) === 'Not Applicable' && !(isDeveloper() && f.ticket === 'Not Applicable')) return false;
    if (q) {
      const blob = [tc.id, tc.scenario, tc.pre, tc.steps, tc.expected, tc.notes].join(' ').toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  });
}

function tcCard(tc) {

  const fileIn = el('input',{type:'file',accept:'image/*',class:'file-input-hidden'});
  drop.appendChild(fileIn);
  let screenshotData = null;
  let screenshotName = null;
  function setFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = () => {
      const b64 = String(reader.result || '').split(',')[1] || '';
      screenshotData = b64;
      screenshotName = file.name || 'screenshot.png';
      drop.classList.add('has');
      drop.innerHTML = '';
      const meta = el('div',{class:'preview-meta'},
        el('span',{}, '✓ ', screenshotName, ' (', Math.round(file.size/1024), ' KB)'),
        el('button',{class:'remove',type:'button',on:{click:e=>{e.stopPropagation(); resetDrop();}}}, '× Remove'));
      drop.appendChild(meta);
      drop.appendChild(el('img',{class:'thumb',src:reader.result}));
    };
    reader.readAsDataURL(file);
  }
  function resetDrop() {
    screenshotData = null; screenshotName = null;
    drop.classList.remove('has','dragover');
    drop.innerHTML = '<div>📎 Drop an image here, paste from clipboard, or click to select</div>';
    drop.appendChild(fileIn);
  }
  drop.addEventListener('click', () => fileIn.click());
  drop.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' '){e.preventDefault();fileIn.click();} });
  fileIn.addEventListener('change', () => { if (fileIn.files && fileIn.files[0]) setFile(fileIn.files[0]); });
  drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
  drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
  drop.addEventListener('drop', e => {
    e.preventDefault(); drop.classList.remove('dragover');
    if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
  });
  // Paste from clipboard while form has focus
  const pasteHandler = e => {
    if (!form.contains(document.activeElement) && document.activeElement !== form) return;
    const items = (e.clipboardData || {}).items || [];
    for (const it of items) if (it.type && it.type.startsWith('image/')) { setFile(it.getAsFile()); e.preventDefault(); return; }
  };
  document.addEventListener('paste', pasteHandler);
  form.appendChild(drop);

  // Actions
  const actions = el('div',{class:'actions'});
  const createBtn = el('button',{class:'btn primary',type:'button'}, 'Create ticket');
  const cancelBtn = el('button',{class:'btn',type:'button',on:{click:()=>{document.removeEventListener('paste',pasteHandler); mount.innerHTML='';}}}, 'Cancel');
  const status = el('span',{class:'status'},'');
  actions.appendChild(createBtn);
  actions.appendChild(cancelBtn);
  actions.appendChild(status);
  form.appendChild(actions);

  const result = el('div',{class:'result'});
  form.appendChild(result);

  createBtn.addEventListener('click', async () => {
    const title = titleInput.value.trim();
    if (!title) { status.className='status err'; status.textContent='Title required'; return; }
    createBtn.disabled = true; cancelBtn.disabled = true;
    status.className = 'status'; status.textContent = 'Filing in JIRA…';
    try {
      const payload = {
        tcId: tc.id,
        issueType: selectedType,
        title,
        steps: stepsInput.value,
        expected: expInput.value,
        actual: actInput.value,
        severity: tc.severity || '',
      };
      if (screenshotData) {
        payload.screenshotBase64 = screenshotData;
        payload.screenshotName = screenshotName;
      }
      const r = await fetch('/api/jira/create', {
        method: 'POST',
        headers: { 'content-type':'application/json' },

        body: JSON.stringify(payload),

      const data = await r.json();
      if (!r.ok) {
        status.className = 'status err';
        status.textContent = 'Failed: ' + (data && (data.error || JSON.stringify(data)) || r.status);
        createBtn.disabled = false; cancelBtn.disabled = false;
        return;
      }
      JIRA_KEYS[tc.id] = data.key;
      status.className = 'status ok'; status.textContent = '✓ Filed';
      result.classList.add('on');
      result.innerHTML = '';
      result.appendChild(el('div',{},
        '✓ Ticket created: ',
        el('a',{href:data.url,target:'_blank',rel:'noopener'}, data.key),
        data.attachment ? (data.attachment.ok ? ' · screenshot attached' : ' · ⚠ attachment failed') : ''));
      // Re-render the grid / home to reflect the new badge
      if (state.view==='module') {
        const mod = DATA.modules.find(x=>x.id===state.moduleId);
        if (mod) renderGrid(mod);
      } else { renderHome(); }
      // Keep form visible (user might want to file another); reset Actual + screenshot
      actInput.value = '';
      resetDrop();
      createBtn.disabled = false; cancelBtn.disabled = false;
    } catch (e) {
      status.className = 'status err'; status.textContent = 'Error: ' + (e?.message || e);
      createBtn.disabled = false; cancelBtn.disabled = false;
    }
  });

  mount.appendChild(form);
  // Cleanup paste handler when modal closes
  const cleanup = () => { document.removeEventListener('paste', pasteHandler); document.getElementById('modalBg').removeEventListener('transitionend', cleanup); };
  document.getElementById('modalBg').addEventListener('transitionend', cleanup, {once:true});
  titleInput.focus();

function renderTouchpoints(tc) {
  const sec = el('section',{});
  sec.appendChild(el('h4',{}, 'Touchpoints to verify'));
  const list = tc.touchpoints || [];
  if (!list.length) {
    sec.appendChild(el('div',{class:'empty', style:'color:var(--text-3);font-size:13px;font-style:italic;padding:6px 0 0;'},
      'No touchpoints recorded yet — the developer should verify only the primary screen for this test.'));
    return sec;
  }
  // Group by role; preserve first-seen order
  const byRole = new Map();
  for (const tp of list) {
    const r = tp.role || 'Any';
    if (!byRole.has(r)) byRole.set(r, []);
    byRole.get(r).push(tp);
  }
  const wrap = el('div',{class:'touchpoints'});
  for (const [role, items] of byRole.entries()) {
    const grp = el('div',{class:'role-group'});
    const cls = role==='State Head' ? 'role-StateHead' : 'role-'+role.replace(/\s/g,'');
    grp.appendChild(el('div',{class:'role-head'},

    ));
    const ul = el('ul',{});
    for (const it of items) {
      const li = el('li',{});
      if (it.screen) li.appendChild(el('span',{class:'screen'}, it.screen, ' — '));
      li.appendChild(document.createTextNode(it.action || ''));
      ul.appendChild(li);
    }
    grp.appendChild(ul);
    wrap.appendChild(grp);
  }
  sec.appendChild(wrap);
  return sec;
}

// ---- Excel exports (QA-only) ---------------------------------------------
// Save destination: uses the File System Access API so the user picks the
// target folder once per session, and every subsequent export saves there
// silently. Falls back to a normal browser download in browsers that don't
// support the API (Firefox today).

let EXPORT_DIR_HANDLE = null;  // remembered for the session once granted

async function ensureExportDir() {
  if (EXPORT_DIR_HANDLE) return EXPORT_DIR_HANDLE;
  if (!window.showDirectoryPicker) return null;  // Firefox / unsupported
  try {
    EXPORT_DIR_HANDLE = await window.showDirectoryPicker({ id: 'mel-export-dir', mode: 'readwrite' });
    return EXPORT_DIR_HANDLE;
  } catch (e) {
    // user cancelled — fall back to a download for this export
    return null;
  }
}

async function writeWorkbook(wb, filename) {
  // Try the persistent folder first; fall back to a regular download.
  const ab = XLSX.write(wb, { type: 'array', bookType: 'xlsx' });
  const blob = new Blob([ab], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  const dir = await ensureExportDir();
  if (dir) {
    try {
      const fh = await dir.getFileHandle(filename, { create: true });
      const w  = await fh.createWritable();
      await w.write(blob);
      await w.close();
      return { ok: true, where: 'folder' };
    } catch (e) {
      // permission revoked or write failed — fall through to download
    }
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1500);
  return { ok: true, where: 'downloads' };
}

function nowStamp() {
  const d = new Date();
  const pad = (n) => String(n).padStart(2,'0');
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) +
       '_' + pad(d.getHours()) + '-' + pad(d.getMinutes()) + '-' + pad(d.getSeconds());
}
function safeFileSegment(s) {
  return String(s || '').replace(/[\\/:*?"<>|]+/g, '').replace(/\s+/g, '_').slice(0, 80);
}

// Build the row arrays for one module's TCs. Matches the columns used in the
// existing source Excel so a round-trip preserves shape.
function moduleRowsForExport(m) {
  const headers = ['TC ID','Scenario Name','Type','Precondition','Steps','Expected Result','Actual Result','Status','Severity','BR Ref','Resolution / Notes','Ticket Status','JIRA Key','Roles','Touchpoints'];
  const rows = [headers];
  for (const tc of m.tcs) {
    const s  = effectiveStatus(tc);
    const ts = effectiveTicketStatus(tc);
    const tps = (tc.touchpoints || []).map(t => `${t.role||'Any'} : ${t.screen||''} : ${t.action||''}`).join('\n');
    rows.push([
      tc.id || '',
      tc.scenario || '',
      tc.type || '',
      tc.pre || '',
      tc.steps || '',
      tc.expected || '',
      '',                                  // Actual Result — left blank for QA to fill on paper
      s || 'Not run',
      tc.severity || '',
      tc.br || '',
      tc.notes || '',
      ts || 'Pending',
      JIRA_KEYS[tc.id] || '',
      (tc.roles || []).join('; '),
      tps,
    ]);
  }
  return { headers, rows };
}

function styleHeaderRow(ws, ncols) {
  // Width tuning so the file looks reasonable on first open.
  ws['!cols'] = [
    { wch: 14 }, { wch: 42 }, { wch: 12 }, { wch: 40 }, { wch: 50 }, { wch: 50 },
    { wch: 28 }, { wch: 10 }, { wch: 10 }, { wch: 18 }, { wch: 32 }, { wch: 14 },
    { wch: 14 }, { wch: 22 }, { wch: 50 },
  ].slice(0, ncols);
  // Navy header (#1E40AF) + white bold text. Requires xlsx-js-style — plain xlsx ignores .s.
  const headerStyle = {
    fill: { patternType: 'solid', fgColor: { rgb: '1E40AF' } },
    font: { bold: true, color: { rgb: 'FFFFFF' }, sz: 11 },
    alignment: { horizontal: 'left', vertical: 'center', wrapText: true },
    border: {
      top:    { style: 'thin', color: { rgb: '1E3A8A' } },
      bottom: { style: 'thin', color: { rgb: '1E3A8A' } },
      left:   { style: 'thin', color: { rgb: '1E3A8A' } },
      right:  { style: 'thin', color: { rgb: '1E3A8A' } },
    },
  };
  for (let c = 0; c < ncols; c++) {
    const addr = XLSX.utils.encode_cell({ r: 0, c });
    if (ws[addr]) ws[addr].s = headerStyle;
  }
  // Body cells: wrapText so embedded \n in Steps / Expected / Touchpoints renders as visible line breaks; top-align so multi-line cells anchor nicely.
  const bodyStyle = { alignment: { vertical: 'top', wrapText: true } };
  const range = XLSX.utils.decode_range(ws['!ref'] || 'A1');
  for (let r = 1; r <= range.e.r; r++) {
    for (let c = 0; c <= range.e.c; c++) {
      const addr = XLSX.utils.encode_cell({ r, c });
      if (ws[addr]) ws[addr].s = bodyStyle;
    }
  }
  // Give the header a bit more vertical room so wrapped header titles aren't cramped.
  ws['!rows'] = [{ hpt: 26 }];
}

async function exportModuleExcel(m) {
  if (!window.XLSX) { alert('Export library still loading — try again in a moment.'); return; }
  const { rows, headers } = moduleRowsForExport(m);
  const ws = XLSX.utils.aoa_to_sheet(rows);
  styleHeaderRow(ws, headers.length);
  ws['!freeze'] = { xSplit: 1, ySplit: 1 };
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, safeFileSegment(m.name).slice(0, 31) || m.id);
  const filename = `${safeFileSegment(m.name)}_${nowStamp()}.xlsx`;
  const result = await writeWorkbook(wb, filename);
  if (result.where === 'downloads') {
    console.info('Saved to Downloads as', filename, '— pick a folder to persist next time.');
  }
}

// ---- Bulk Export picker --------------------------------------------------
// Opens a modal with the full list of modules + checkboxes. On submit, each
// selected module is exported as a separate .xlsx file into the chosen folder.

const EXP_SEL = new Set();  // module ids currently checked

function openBulkExportPicker() {
  if (!window.XLSX) { alert('Export library still loading — try again in a moment.'); return; }
  EXP_SEL.clear();
  renderExpList();
  document.getElementById('expBg').classList.add('on');
}
function closeBulkExportPicker() {
  document.getElementById('expBg').classList.remove('on');
}
function renderExpList() {
  const list = document.getElementById('expList');
  list.innerHTML = '';
  // Group by category like the sidebar
  const byCat = {};
  for (const m of visibleModules()) (byCat[m.category] ||= []).push(m);
  for (const cat in byCat) {
    list.appendChild(el('div',{class:'exp-cat'}, cat));
    for (const m of byCat[cat]) {
      const checked = EXP_SEL.has(m.id);
      const row = el('label',{class:'exp-row' + (checked ? ' on' : ''), 'data-mid': m.id});
      const cb = el('input',{type:'checkbox'});
      cb.checked = checked;
      cb.addEventListener('change', () => {
        if (cb.checked) EXP_SEL.add(m.id); else EXP_SEL.delete(m.id);
        row.classList.toggle('on', cb.checked);
        updateExpFooter();
      });
      row.appendChild(cb);
      row.appendChild(el('span',{class:'ic'}, m.icon || '📁'));
      row.appendChild(el('span',{class:'nm'}, m.name));
      row.appendChild(el('span',{class:'ct'}, String(m.tcs.length)));
      list.appendChild(row);
    }
  }
  updateExpFooter();
}
function updateExpFooter() {
  document.getElementById('expCount').textContent = `${EXP_SEL.size} selected`;
  document.getElementById('expGo').disabled = EXP_SEL.size === 0;
}

async function runBulkExport() {
  const picked = DATA.modules.filter(m => EXP_SEL.has(m.id));
  if (!picked.length) return;
  const goBtn = document.getElementById('expGo');
  const origLabel = goBtn.textContent;
  goBtn.disabled = true;
  // Make sure the folder is picked once for the whole batch (avoids one prompt per file)
  await ensureExportDir();
  let savedFolder = 0, savedDownloads = 0, failed = 0;
  for (let i = 0; i < picked.length; i++) {
    const m = picked[i];
    goBtn.textContent = `Saving ${i+1}/${picked.length}…`;
    try {
      const { rows, headers } = moduleRowsForExport(m);
      const ws = XLSX.utils.aoa_to_sheet(rows);
      styleHeaderRow(ws, headers.length);
      ws['!freeze'] = { xSplit: 1, ySplit: 1 };
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, safeFileSegment(m.name).slice(0, 31) || m.id);
      const filename = `${safeFileSegment(m.name)}_${nowStamp()}.xlsx`;
      const r = await writeWorkbook(wb, filename);
      if (r.where === 'folder') savedFolder++; else savedDownloads++;
    } catch (e) {
      failed++;
      console.error('Export failed for', m.id, e);
    }
  }
  goBtn.textContent = origLabel;
  goBtn.disabled = false;
  closeBulkExportPicker();
  const parts = [];
  if (savedFolder)    parts.push(`${savedFolder} saved to your folder`);
  if (savedDownloads) parts.push(`${savedDownloads} saved to Downloads`);
  if (failed)         parts.push(`${failed} failed`);
  alert('Bulk export done — ' + parts.join(', ') + '.');
}

// Picker wiring
document.getElementById('expClose').addEventListener('click', closeBulkExportPicker);
document.getElementById('expBg').addEventListener('click', (e) => { if (e.target.id === 'expBg') closeBulkExportPicker(); });
document.getElementById('expAll').addEventListener('click', () => { visibleModules().forEach(m => EXP_SEL.add(m.id)); renderExpList(); });
document.getElementById('expNone').addEventListener('click', () => { EXP_SEL.clear(); renderExpList(); });
document.getElementById('expGo').addEventListener('click', runBulkExport);

<script>
(() => {
  // Local state for the Reports view (scoped to this IIFE)
  const r = {
    mode: 'single',
    date: '', from: '', to: '',
    runs: [],
    activeModule: '__all',
  };
  const todayISO = () => new Date().toISOString().slice(0,10);
  r.date = r.from = r.to = todayISO();

  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const fmtTime = (iso) => { try { return new Date(iso).toLocaleString('en-GB', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit', second:'2-digit'}); } catch { return iso || ''; } };
  const fmtDate = (iso) => { try { return new Date(iso+'T00:00:00').toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'}); } catch { return iso; } };
  const fmtDur  = (ms) => ms >= 1000 ? `${(ms/1000).toFixed(1)}s` : `${ms}ms`;

  function statusCounts(runs) {
    const c = { passed: 0, failed: 0, skipped: 0 };
    for (const x of runs) {
      const s = String(x.status || '');
      if (s === 'passed') c.passed++;
      else if (s === 'failed' || s === 'timedOut' || s === 'interrupted') c.failed++;
      else c.skipped++;
    }
    return c;
  }

  function buildDonut(c) {
    const total = c.passed + c.failed + c.skipped;
    if (total === 0) {
      return `<svg viewBox="0 0 160 160" width="170" height="170">
        <circle cx="80" cy="80" r="56" fill="none" stroke="#f1f5f9" stroke-width="18"/>
        <text x="80" y="84" text-anchor="middle" font-size="14" fill="#94a3b8">No data</text>
      </svg>`;
    }
    const R = 56, C = 2 * Math.PI * R;
    const segs = [
      { v: c.passed,  color: '#10b981' },
      { v: c.failed,  color: '#ef4444' },
      { v: c.skipped, color: '#f59e0b' },
    ].filter(s => s.v > 0);

    let offset = 0;
    const arcs = segs.map(s => {
      const len = (s.v / total) * C;
      const dash = `${len} ${C - len}`;
      const arc = `<circle cx="80" cy="80" r="${R}" fill="none" stroke="${s.color}" stroke-width="18" stroke-dasharray="${dash}" stroke-dashoffset="${-offset}" transform="rotate(-90 80 80)" stroke-linecap="butt"/>`;
      offset += len;
      return arc;
    }).join('');

    const pct = Math.round((c.passed / total) * 100);
    return `<svg viewBox="0 0 160 160" width="170" height="170" role="img" aria-label="${pct}% pass rate">
      <circle cx="80" cy="80" r="${R}" fill="none" stroke="#f1f5f9" stroke-width="18"/>
      ${arcs}
      <text x="80" y="76" text-anchor="middle" font-size="30" font-weight="700" fill="#0f172a">${pct}%</text>
      <text x="80" y="96" text-anchor="middle" font-size="10" fill="#64748b" letter-spacing="1">PASS RATE</text>
    </svg>`;
  }

  function buildKpis(runs) {
    const c = statusCounts(runs);
    const total = runs.length;
    const sumDur = runs.reduce((a, x) => a + (Number(x.durationMs) || 0), 0);
    const avgDur = total > 0 ? Math.round(sumDur / total) : 0;
    const passRate = total > 0 ? Math.round((c.passed / total) * 100) : 0;
    return `
      <div class="runs-kpis">
        <div class="kpi">
          <div class="kpi-icon">📊</div>
          <div class="kpi-val">${total}</div>
          <div class="kpi-lbl">Testcases</div>
        </div>
        <div class="kpi pass">
          <div class="kpi-icon">✓</div>
          <div class="kpi-val">${passRate}%</div>
          <div class="kpi-lbl">${c.passed} passed</div>
        </div>
        <div class="kpi fail">
          <div class="kpi-icon">✗</div>
          <div class="kpi-val">${c.failed}</div>
          <div class="kpi-lbl">Failed</div>
        </div>
        <div class="kpi dur">
          <div class="kpi-icon">⏱</div>
          <div class="kpi-val">${fmtDur(avgDur)}</div>
          <div class="kpi-lbl">Avg duration</div>
        </div>
      </div>`;
  }

  function buildDonutCard(runs) {
    const c = statusCounts(runs);
    const total = runs.length;
    const pct = (n) => total > 0 ? Math.round((n / total) * 100) : 0;
    return `
      <div class="chart-card">
        <h4>Status breakdown</h4>
        <div class="donut-wrap">
          ${buildDonut(c)}
          <div class="donut-legend">
            <div class="legend-row"><span class="dot passed"></span><span class="lbl">Passed</span>  <span class="val">${c.passed}</span>  <span class="pct">${pct(c.passed)}%</span></div>
            <div class="legend-row"><span class="dot failed"></span><span class="lbl">Failed</span>  <span class="val">${c.failed}</span>  <span class="pct">${pct(c.failed)}%</span></div>
            <div class="legend-row"><span class="dot skipped"></span><span class="lbl">Skipped</span> <span class="val">${c.skipped}</span> <span class="pct">${pct(c.skipped)}%</span></div>
          </div>
        </div>
      </div>`;
  }

  function buildModBarsCard(byModule) {
    const rows = Object.entries(byModule).map(([name, mc]) => {
      const t = mc.total || 1;
      const p = (mc.passed  / t) * 100;
      const f = (mc.failed  / t) * 100;
      const s = (mc.skipped / t) * 100;
      return `
        <div class="modbar" title="${esc(name)}: ${mc.passed} passed · ${mc.failed} failed · ${mc.skipped} skipped">
          <div class="modbar-name">${esc(name)}</div>
          <div class="modbar-track">
            ${p ? `<div class="modbar-pass" style="width:${p.toFixed(2)}%"></div>` : ''}
            ${f ? `<div class="modbar-fail" style="width:${f.toFixed(2)}%"></div>` : ''}
            ${s ? `<div class="modbar-skip" style="width:${s.toFixed(2)}%"></div>` : ''}
          </div>
          <div class="modbar-num">${mc.passed}/${mc.total}</div>
        </div>`;
    }).join('');
    return `
      <div class="chart-card">
        <h4>Pass rate by module</h4>
        <div class="modbars">${rows}</div>
      </div>`;
  }

  function buildTimeChartCard(runs) {
    if (!runs.length) {
      return `<div class="chart-card"><h4>Runs per day</h4><div class="timechart-empty">No runs in this window.</div></div>`;
    }
    const byDay = {};
    for (const x of runs) {
      const d = String(x.startedAt || '').slice(0, 10);
      if (!byDay[d]) byDay[d] = { passed: 0, failed: 0, skipped: 0, total: 0 };
      byDay[d].total++;
      const s = String(x.status || '');
      if (s === 'passed') byDay[d].passed++;
      else if (s === 'failed' || s === 'timedOut' || s === 'interrupted') byDay[d].failed++;
      else byDay[d].skipped++;
    }
    const days = Object.keys(byDay).sort();
    const max = Math.max(...days.map(d => byDay[d].total));
    const cols = days.map(d => {
      const c = byDay[d];
      const h = (n) => max > 0 ? `${(n / max) * 120}px` : '0';
      const tip = `${d}: ${c.passed} passed · ${c.failed} failed · ${c.skipped} skipped`;
      const dayLabel = new Date(d + 'T00:00:00Z').toLocaleDateString('en-GB', { day:'2-digit', month:'short' });
      return `
        <div class="tc-col" title="${esc(tip)}">
          <div class="tc-total">${c.total}</div>
          <div class="tc-bar" style="height:120px">
            <div class="pass" style="height:${h(c.passed)}"></div>
            <div class="fail" style="height:${h(c.failed)}"></div>
            <div class="skip" style="height:${h(c.skipped)}"></div>
          </div>
          <div class="tc-lbl">${esc(dayLabel)}</div>
        </div>`;
    }).join('');
    return `<div class="chart-card"><h4>Runs per day</h4><div class="timechart">${cols}</div></div>`;
  }

  function buildHero(runs, byModule, isAllTab) {
    const kpis = buildKpis(runs);
    const donut = buildDonutCard(runs);
    const cards = [donut];
    if (isAllTab && Object.keys(byModule).length > 0) cards.push(buildModBarsCard(byModule));
    if (r.mode === 'range') cards.push(buildTimeChartCard(runs));
    const cls = cards.length === 1 ? 'runs-charts solo' : 'runs-charts';
    const grid = cards.length >= 3 ? 'style="grid-template-columns:repeat(auto-fit,minmax(320px,1fr))"' : '';
    return kpis + `<div class="${cls}" ${grid}>${cards.join('')}</div>`;
  }

  function groupByModule(runs) {
    const out = {};
    for (const x of runs) {
      const m = x.module || '(no module)';
      if (!out[m]) out[m] = { total:0, passed:0, failed:0, skipped:0, runs:[] };
      out[m].total++; out[m].runs.push(x);
      const s = String(x.status||'');
      if (s === 'passed') out[m].passed++;
      else if (s === 'failed' || s === 'timedOut' || s === 'interrupted') out[m].failed++;
      else out[m].skipped++;
    }
    return out;
  }

  function fetchRuns() {
    const q = r.mode === 'single'
      ? `?date=${encodeURIComponent(r.date)}`
      : `?from=${encodeURIComponent(r.from)}&to=${encodeURIComponent(r.to)}`;
    return fetch('/api/runs' + q)
      .then(rs => rs.ok ? rs.json() : { runs: [] })
      .then(j => Array.isArray(j.runs) ? j.runs : [])
      .catch(() => []);
  }

  function downloadFile(name, content, mime) {
    const blob = new Blob([content], { type: mime + ';charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = name;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  function buildCsv(runs) {
    const cols = ['tcId','scenario','module','env','status','startedAt','durationMs','error'];
    const q = (v) => `"${String(v ?? '').replace(/"/g,'""')}"`;
    return [cols.join(','), ...runs.map(x => cols.map(c => q(x[c])).join(','))].join('\n');
  }

  function buildHtml(label, runs) {
    const byModule = groupByModule(runs);
    const modCards = Object.entries(byModule).map(([n,c]) => `
      <div class="modcard"><div class="modname">${esc(n)}</div>
        <div class="modstats">
          <span class="chip">${c.total} testcase${c.total===1?'':'s'}</span>
          ${c.passed  ? `<span class="chip passed">${c.passed} passed</span>` : ''}
          ${c.failed  ? `<span class="chip failed">${c.failed} failed</span>` : ''}
          ${c.skipped ? `<span class="chip skipped">${c.skipped} skipped</span>` : ''}
        </div></div>`).join('');
    const rows = runs.map(x => `<tr>
      <td class="tc">${esc(x.tcId)}</td>
      <td>${esc(x.scenario||'')}<br><span class="muted">${esc(x.module||'')}</span></td>
      <td>${esc(x.env||'')}</td>
      <td><span class="badge ${esc(String(x.status||'').toLowerCase())}">${esc(x.status||'')}</span></td>
      <td>${esc(fmtTime(x.startedAt))}</td>
      <td>${esc(fmtDur(Number(x.durationMs||0)))}</td>
      <td class="err">${esc(x.error||'')}</td>
    </tr>`).join('');
    return `<!doctype html><html><head><meta charset="utf-8"><title>MEL Test Runs — ${esc(label)}</title>
<style>
body{font-family:Inter,system-ui,sans-serif;margin:0;padding:24px;color:#0f172a;background:#f8fafc}
h1{margin:0 0 4px;font-size:22px}
.meta{color:#64748b;font-size:13px;margin-bottom:18px}
.section-title{margin:18px 0 8px;font-size:11.5px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.04em}
.modules{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px;margin-bottom:18px}
.modcard{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:12px 14px}
.modname{font-weight:700;font-size:14px;color:#0f172a;margin-bottom:8px}
.modstats{display:flex;flex-wrap:wrap;gap:6px;font-size:12px}
.modstats .chip{padding:3px 9px;border-radius:6px;background:#e2e8f0;color:#334155;font-weight:600}
.modstats .chip.passed{background:#dcfce7;color:#166534}
.modstats .chip.failed{background:#fee2e2;color:#991b1b}
.modstats .chip.skipped{background:#fef3c7;color:#92400e}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
th{text-align:left;padding:10px 12px;background:#f8fafc;border-bottom:1px solid #e5e7eb;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:#475569}
td{padding:10px 12px;border-bottom:1px solid #f1f5f9;font-size:13px;vertical-align:top}
.tc{font-family:'JetBrains Mono',monospace;color:#4f46e5;font-weight:600;white-space:nowrap}
.badge{padding:2px 8px;border-radius:6px;font-size:11.5px;font-weight:600;background:#f1f5f9;color:#334155;text-transform:capitalize}
.badge.passed{background:#dcfce7;color:#166534}
.badge.failed,.badge.timedout,.badge.interrupted{background:#fee2e2;color:#991b1b}
.badge.skipped{background:#fef3c7;color:#92400e}
.muted{color:#64748b;font-size:11.5px}
.err{color:#991b1b;font-family:'JetBrains Mono',monospace;font-size:11.5px;max-width:380px;white-space:pre-wrap}
<\/style></head><body>
<h1>MEL Test Runs — ${esc(label)}</h1>
<div class="meta">${runs.length} testcase${runs.length===1?'':'s'} executed · generated ${esc(new Date().toLocaleString('en-GB'))}</div>
<div class="section-title">Module summary</div>
<div class="modules">${modCards}</div>
<div class="section-title">All runs</div>
<table><thead><tr><th>TC ID</th><th>Scenario</th><th>Env</th><th>Status</th><th>Started</th><th>Duration</th><th>Error</th></tr></thead><tbody>${rows}</tbody></table>
</body></html>`;
  }

  // Expose renderRuns so the main render() can call it.
  window.renderRuns = async function renderRuns() {
    const root = document.getElementById('root');
    if (!root) return;

    const label = r.mode === 'single' ? fmtDate(r.date) : `${fmtDate(r.from)} → ${fmtDate(r.to)}`;
    root.innerHTML = `
      <div class="runs-page">
        <div class="runs-page-head">
          <button class="runs-back" id="runsBack" title="Back to dashboard">← Back</button>
          <h2>📅 Reports</h2>
          <div class="runs-sub">Showing ${esc(label)}</div>
        </div>

        <div class="runs-controls">
          <div class="runs-modes" id="runsModes">
            <button data-mode="single" class="${r.mode==='single'?'on':''}">Single date</button>
            <button data-mode="range"  class="${r.mode==='range'?'on':''}">Date range</button>
          </div>
          ${r.mode === 'single' ? `
            <label for="runsDate">Date:</label>
            <input type="date" id="runsDate" value="${esc(r.date)}" />
          ` : `
            <label for="runsFrom">From:</label>
            <input type="date" id="runsFrom" value="${esc(r.from)}" />
            <label for="runsTo">To:</label>
            <input type="date" id="runsTo" value="${esc(r.to)}" />
          `}
          <div class="runs-presets" id="runsPresets">
            <button data-preset="today">Today</button>
            <button data-preset="week">This week</button>
            <button data-preset="month">This month</button>
            <button data-preset="last30">Last 30 days</button>
          </div>
          <div class="runs-meta" id="runsMeta">Loading…</div>
          <div class="runs-download">
            <select id="runsFormat">
              <option value="html">HTML</option>
              <option value="csv">CSV</option>
            </select>
            <button class="btn" id="runsDownload" disabled>⤓ Download</button>
          </div>
        </div>

        <div id="runsBody"></div>
      </div>
    `;

    document.getElementById('runsBack').addEventListener('click', () => { state.view = 'home'; render(); });

    // Range preset buttons
    document.querySelectorAll('#runsPresets button').forEach(btn => {
      btn.addEventListener('click', () => {
        const today = new Date();
        const todayStr = today.toISOString().slice(0,10);
        if (btn.dataset.preset === 'today') {
          r.mode = 'single'; r.date = todayStr;
        } else {
          r.mode = 'range'; r.to = todayStr;
          if (btn.dataset.preset === 'week') {
            const d = new Date(today);
            const day = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() - day + 1);
            r.from = d.toISOString().slice(0,10);
          } else if (btn.dataset.preset === 'month') {
            r.from = todayStr.slice(0,7) + '-01';
          } else if (btn.dataset.preset === 'last30') {
            const d = new Date(today); d.setUTCDate(d.getUTCDate() - 30);
            r.from = d.toISOString().slice(0,10);
          }
        }
        render();
      });
    });

    // Wire control listeners
    root.querySelectorAll('.runs-modes button').forEach(btn => {
      btn.addEventListener('click', () => { r.mode = btn.dataset.mode; render(); });
    });
    const dIn = document.getElementById('runsDate');
    if (dIn) dIn.addEventListener('change', () => { r.date = dIn.value; render(); });
    const fIn = document.getElementById('runsFrom');
    const tIn = document.getElementById('runsTo');
    if (fIn) fIn.addEventListener('change', () => { r.from = fIn.value; render(); });
    if (tIn) tIn.addEventListener('change', () => { r.to   = tIn.value; render(); });

    // Fetch data
    const runs = await fetchRuns();
    r.runs = runs;

    const meta = document.getElementById('runsMeta');
    if (meta) meta.textContent = runs.length ? `${runs.length} testcase${runs.length===1?'':'s'}` : 'No runs in this window';
    const dlBtn = document.getElementById('runsDownload');
    if (dlBtn) {
      dlBtn.disabled = runs.length === 0;
      dlBtn.addEventListener('click', () => {
        const fmt = document.getElementById('runsFormat').value;
        const tag = r.mode === 'single' ? r.date : `${r.from}_to_${r.to}`;
        const fname = `mel-test-runs-${tag}.${fmt}`;
        const content = fmt === 'csv' ? buildCsv(r.runs) : buildHtml(label, r.runs);
        const mime = fmt === 'csv' ? 'text/csv' : 'text/html';
        downloadFile(fname, content, mime);
      });
    }

    // Body: tabs + content
    const body = document.getElementById('runsBody');
    if (!runs.length) {
      body.innerHTML = '<div class="runs-empty">No testcases executed in this window.</div>';
      return;
    }

    const byModule = groupByModule(runs);
    const modules = Object.entries(byModule);

    if (r.activeModule !== '__all' && !byModule[r.activeModule]) r.activeModule = '__all';

    const tabs = `
      <div class="runs-tabs" role="tablist">
        <button class="runs-tab ${r.activeModule==='__all'?'on':''}" data-tab="__all">
          All<span class="ct">${runs.length}</span>
        </button>
        ${modules.map(([name,c]) => `
          <button class="runs-tab ${r.activeModule===name?'on':''}" data-tab="${esc(name)}">
            ${esc(name)}<span class="ct">${c.total}</span>
          </button>
        `).join('')}
      </div>`;

    const filtered = r.activeModule === '__all'
      ? runs
      : (byModule[r.activeModule]?.runs || []);

    const summary = r.activeModule === '__all' ? `
      <div class="runs-modsum">
        ${modules.map(([name,c]) => `
          <div class="runs-modsum-card">
            <div class="name">${esc(name)}</div>
            <div class="stats">
              <span class="chip">${c.total} testcase${c.total===1?'':'s'}</span>
              ${c.passed  ? `<span class="chip passed">${c.passed} passed</span>` : ''}
              ${c.failed  ? `<span class="chip failed">${c.failed} failed</span>` : ''}
              ${c.skipped ? `<span class="chip skipped">${c.skipped} skipped</span>` : ''}
            </div>
          </div>
        `).join('')}
      </div>` : '';

    const table = `
      <div class="runs-table-wrap">
        <table class="runs-table">
          <thead><tr>
            <th>TC ID</th><th>Scenario</th><th>Env</th><th>Status</th>
            <th>Started</th><th>Duration</th><th>Error</th>
          </tr></thead>
          <tbody>
            ${filtered.map(x => `
              <tr>
                <td class="tc">${esc(x.tcId)}</td>
                <td>${esc(x.scenario || '')}<div class="env">${esc(x.module || '')}</div></td>
                <td class="env">${esc(x.env || '')}</td>
                <td><span class="badge ${esc(String(x.status||'').toLowerCase())}">${esc(x.status||'')}</span></td>
                <td class="when">${esc(fmtTime(x.startedAt))}</td>
                <td>${esc(fmtDur(Number(x.durationMs||0)))}</td>
                <td><div class="err">${esc(x.error || '')}</div></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>`;

    const hero = buildHero(filtered, byModule, r.activeModule === '__all');

    body.innerHTML = tabs + hero + table;

    body.querySelectorAll('.runs-tab').forEach(btn => {
      btn.addEventListener('click', () => { r.activeModule = btn.dataset.tab; render(); });
    });
  };

  // Topbar button: switch to Reports view (button is hidden for non-QA via renderTopNav)
  const runsBtn = document.getElementById('runsBtn');
  if (runsBtn) runsBtn.addEventListener('click', () => { state.view = 'runs'; render(); });

  // Expose chart + formatting helpers so renderHome() can reuse them for the landing dashboard.
  window.melCharts = {
    buildDonut, buildDonutCard, buildModBarsCard, statusCounts, groupByModule,
    fmtTime, fmtDur, esc,
  };
})();
</script>
</body>
</html>
